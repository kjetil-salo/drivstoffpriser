services:
  drivstoffpriser:
    build: .
    restart: always
    ports:
      - "3002:3002"
    environment:
      PORT: "3002"
      DB_PATH: "/app/data/drivstoff.db"
      SECRET_KEY: "${SECRET_KEY:-bytt-meg-i-prod}"
      STATS_KEY: "${STATS_KEY:-salo}"
      BASE_URL: "https://drivstoff.ksalo.no"
      DATA_DIR: "/app/data"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      REGISTRER_KODE: "${REGISTRER_KODE:-}"
      PARTNER_API_KEY: "${PARTNER_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OCR_MODELL: "gemini"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODELL: "${GEMINI_MODELL:-gemini-2.5-flash-lite}"
      GEMINI_MODELLER: "${GEMINI_MODELLER:-gemini-2.5-flash-lite,gemini-flash-lite-latest}"
      STATIONS_API_KEY: "${STATIONS_API_KEY:-}"
      GRAPHHOPPER_API_KEY: "${GRAPHHOPPER_API_KEY:-}"
      RUTE_MOTOR: "${RUTE_MOTOR:-graphhopper}"
      OCR_LAGRE_BILDER: "1"
      OCR_BILDE_DIR: "/app/data/ocr-bilder"
      OCR_BILDE_RETENTION_DAGER: "90"
      LOG_LEVEL: "WARNING"
    volumes:
      - drivstoff-data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  drivstoff-data:
