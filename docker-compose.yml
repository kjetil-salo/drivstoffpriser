services:
  drivstoffpriser:
    build: .
    restart: always
    ports:
      - "3002:3002"
    environment:
      PORT: "3002"
      DB_PATH: "/app/data/drivstoff.db"
      SECRET_KEY: "${SECRET_KEY:-bytt-meg-i-prod}"
      STATS_KEY: "${STATS_KEY:-salo}"
      BASE_URL: "https://drivstoff.ksalo.no"
      DATA_DIR: "/app/data"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      REGISTRER_KODE: "${REGISTRER_KODE:-}"
      PARTNER_API_KEY: "${PARTNER_API_KEY:-}"
      LOG_LEVEL: "WARNING"
    volumes:
      - drivstoff-data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  drivstoff-data:
