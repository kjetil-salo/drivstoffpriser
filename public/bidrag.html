<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <title>Bidragsmodus — Drivstoffprisene</title>
  <link rel="stylesheet" href="/css/tokens.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: var(--font-base);
      min-height: 100dvh;
      overscroll-behavior: none;
    }

    /* ── Header ── */
    #b-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #0f172a;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: 10px var(--space-md);
    }
    #b-tilbake {
      font-size: 1.2rem;
      text-decoration: none;
      color: var(--color-muted);
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    #b-tilbake:hover { color: var(--color-text); }
    #b-rang {
      flex: 1;
      font-size: var(--font-sm);
      color: var(--color-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #b-rang strong { color: var(--color-text); }
    #b-radius {
      background: var(--color-card-bg);
      color: var(--color-text);
      border: 1px solid var(--border-color-medium);
      border-radius: var(--radius-sm);
      padding: 6px 8px;
      font-size: var(--font-sm);
      flex-shrink: 0;
    }

    /* ── GPS-status ── */
    #b-gps {
      text-align: center;
      padding: var(--space-lg) var(--space-md);
      color: var(--color-muted);
      font-size: var(--font-sm);
    }

    /* ── Liste ── */
    #b-liste {
      list-style: none;
      padding: var(--space-sm) var(--space-sm) 80px;
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }

    /* ── Stasjonskort ── */
    .b-kort {
      background: var(--color-card-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      transition: border-color var(--transition-base);
    }
    .b-kort-topp {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      margin-bottom: var(--space-sm);
    }
    .b-badge {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-sm);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .b-badge img {
      width: 32px;
      height: 32px;
      object-fit: contain;
      position: relative;
      z-index: 1;
    }
    .b-badge span {
      font-size: 11px;
      font-weight: 800;
      color: #fff;
    }
    .b-info { flex: 1; min-width: 0; }
    .b-navn {
      font-weight: 600;
      font-size: var(--font-md);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .b-meta {
      font-size: var(--font-xs);
      color: var(--color-muted);
      margin-top: 2px;
    }
    .b-gammel { color: var(--color-fuel); }

    /* ── Priser ── */
    .b-priser {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-top: 4px;
    }
    .b-rad {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 4px;
      border-radius: var(--radius-sm);
      transition: background var(--transition-base);
    }
    @keyframes b-flash { 0%,100% { background: transparent; } 40% { background: var(--color-success-soft); } }
    .b-rad-suksess { animation: b-flash 0.9s ease; }
    .b-rad-aktiv   { background: #1e3a5f; }

    .b-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .b-dot-fersk  { background: var(--color-success); }
    .b-dot-ok     { background: var(--color-fuel); }
    .b-dot-gammel { background: var(--color-error); }

    .b-rad-label {
      color: var(--color-muted);
      font-size: var(--font-sm);
      width: 70px;
      flex-shrink: 0;
    }
    .b-rad-pris {
      flex: 1;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      font-size: var(--font-md);
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      border-radius: var(--radius-sm);
      padding: 4px 6px;
      margin: -4px -6px;
    }
    .b-rad-pris:hover { color: var(--color-accent); }
    .b-rad-pris:active { background: rgba(96,165,250,0.1); }
    .b-rad-bekreft {
      background: var(--color-success-soft);
      border: 1px solid var(--color-success);
      border-radius: var(--radius-sm);
      color: var(--color-success);
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      min-width: 44px;
      min-height: 44px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .b-rad-bekreft:hover { background: rgba(34,197,94,0.35); }
    .b-rad-bekreft-placeholder { min-width: 44px; }

    /* ── Inline input (pris-tap) ── */
    .b-inline-input {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--color-accent);
      color: var(--color-text);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      font-size: var(--font-md);
      min-width: 0;
      padding: 0 2px;
      outline: none;
    }
    .b-inline-input.b-input-feil { border-bottom-color: var(--color-error); animation: shake 0.3s; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }

    /* ── Tom liste ── */
    #b-tom {
      text-align: center;
      padding: var(--space-lg);
      color: var(--color-muted);
      font-size: var(--font-sm);
    }

    /* ── Seksjonstitler ── */
    .b-seksjon {
      font-size: var(--font-xs);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-muted);
      padding: var(--space-sm) 4px 2px;
    }
  </style>
</head>
<body>
  <header id="b-header">
    <a href="/" id="b-tilbake" aria-label="Tilbake til kartet">←</a>
    <div id="b-rang" aria-live="polite"></div>
    <select id="b-radius" aria-label="Søkeradius">
      <option value="5">5 km</option>
      <option value="10">10 km</option>
      <option value="20">20 km</option>
    </select>
  </header>

  <div id="b-gps" role="status" aria-live="polite">Henter posisjon …</div>

  <ul id="b-liste" role="list" aria-label="Bensinstasjoner i nærheten"></ul>

  <script type="module" src="/js/bidrag.js"></script>
</body>
</html>
